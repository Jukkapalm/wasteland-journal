<!DOCTYPE html>
<html lang="fi">
    <head>
        <title>Wasteland journal</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@200..800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/tyyli.css">
    </head>
    <body>
        
        <div class="intro-container">
            <p id="intro-txt"></p>
        </div>

        <div class="container">
            <div class="status-panel">
                <h1 class="mt-otsikko">Maailman tila</h1>
                <h2 class="tilanne">Tilanne:</h2>
                <p id="days-since"></p>
                <p id="radiation-level"></p>
                <p>🔋 Virta: 37% (generaattori päällä)</p>
                <p id="sisa-lampotila"></p>
                <p id="ulko-lampotila"></p>
                <h2 class="alueet">Alueet:</h2>
                <p>[✅] Läntinen sektori - ei saasteita</p>
                <p>[✅] Bunkkeri A - turvallinen</p>
                <p>[❗] Kaupunki - vihamielinen</p>
                <h2 class="radio">Radioyhteys:</h2>
                <p id="radio-signal"><span class="dots"></span></p>
            </div>

            <div class="paivakirja">
                <h2 class="pk-otsikko">Päiväkirja</h2>
                <div class="merkinnat"></div>
            </div>
        </div>

        <script src="../wasteland-journal/js/script.js"></script>
    </body>
</html>
